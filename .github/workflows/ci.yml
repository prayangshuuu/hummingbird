# CI — build and test on Linux, macOS, and Windows (CPU-only).
#
# The bootstrap has no inference code; this proves the tree configures, builds
# clean under -Werror, and passes CTest on all three tier-1 platforms. Backend
# and sanitizer jobs are added as those subsystems land (see PROJECT_CONTEXT §6).
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DHB_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    name: ubuntu / ASan+UBSan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Configure (sanitizers on)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug -DHB_ENABLE_ASAN=ON -DHB_ENABLE_UBSAN=ON
      - name: Build
        run: cmake --build build
      - name: Test
        run: ctest --test-dir build --output-on-failure
