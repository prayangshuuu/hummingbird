name: release

# Draft a GitHub release when a semver tag is pushed. Builds the CPU-only
# artifacts on each platform, packages them with CPack, and attaches them to a
# draft release for a maintainer to review and publish. Versioning follows
# CHANGELOG.md (Keep a Changelog / SemVer).

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  package:
    name: package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DHB_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Package
        run: cmake --build build --config Release --target package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hummingbird-${{ matrix.os }}
          path: |
            build/*.tar.gz
            build/*.zip
          if-no-files-found: ignore

  draft-release:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: dist/**/*
